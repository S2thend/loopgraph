name: Release to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Validate tag and branch
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git fetch origin main --depth=1

          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "Tag ${TAG_NAME} does not point to a commit on main."
            exit 1
          fi

          PROJECT_VERSION="$(python - <<'PY'
          import pathlib
          import re

          text = pathlib.Path("pyproject.toml").read_text()
          match = re.search(r'(?m)^version\s*=\s*"([^"]+)"\s*$', text)
          if match is None:
              raise SystemExit("Could not find project version in pyproject.toml")
          print(match.group(1))
          PY
          )"
          TAG_VERSION="${TAG_NAME#v}"

          if [ "${PROJECT_VERSION}" != "${TAG_VERSION}" ]; then
            echo "Tag version ${TAG_VERSION} does not match pyproject.toml version ${PROJECT_VERSION}."
            exit 1
          fi

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e ".[test,lint]"

      - name: Run type checks
        run: mypy

      - name: Run test suite
        run: pytest

      - name: Build distributions
        run: python -m build

      - name: Publish to PyPI
        # Preferred setup: configure this repository as a PyPI trusted publisher
        # for the "Release to PyPI" workflow so OIDC can mint the upload token.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
